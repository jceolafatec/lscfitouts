<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Model Viewer – Pytha Draftsman</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #111118;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Canvas container ── */
        #viewer-container {
            position: fixed;
            inset: 0;
        }

        #model-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Top bar ── */
        #top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }

        #back-link {
            pointer-events: auto;
            color: rgba(255,255,255,0.78);
            text-decoration: none;
            font-size: 0.82rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            transition: color 0.2s;
        }
        #back-link:hover { color: #fff; }

        #model-info {
            text-align: right;
        }
        #modelTitle {
            margin: 0;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        #modelDescription {
            margin: 0.2rem 0 0;
            color: rgba(255,255,255,0.5);
            font-size: 0.78rem;
            letter-spacing: 0.06em;
        }

        /* ── Controls bar at bottom ── */
        #controls-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1.1rem 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
            z-index: 10;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.88);
            border-radius: 6px;
            padding: 0.38rem 0.9rem;
            font-size: 0.76rem;
            font-family: inherit;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: background 0.18s, border-color 0.18s, color 0.18s;
        }
        .ctrl-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
            color: #fff;
        }
        .ctrl-btn.active {
            background: rgba(255,255,255,0.28);
            border-color: rgba(255,255,255,0.65);
            color: #fff;
        }

        /* ── Group controls panel ── */
        #group-controls {
            position: fixed;
            top: 64px; left: 1.5rem;
            background: rgba(18,18,28,0.88);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 1rem 1.2rem;
            color: rgba(255,255,255,0.88);
            font-size: 0.82rem;
            max-height: 60vh;
            overflow-y: auto;
            display: none;
            min-width: 170px;
            z-index: 15;
        }
        #group-controls h3 {
            margin: 0 0 0.75rem;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: rgba(255,255,255,0.5);
        }
        .group-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.45rem;
        }
        .group-toggle label { cursor: pointer; }

        /* ── Loading & error overlays ── */
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.65);
            font-size: 0.85rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            z-index: 20;
        }
        #error {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,10,14,0.92);
            border: 1px solid rgba(255,80,80,0.4);
            color: #ff7070;
            padding: 1.2rem 1.6rem;
            border-radius: 10px;
            max-width: 380px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
            z-index: 20;
        }

        /* ── Hint text ── */
        #orbit-hint {
            position: fixed;
            bottom: 4rem; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 0.72rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 5;
            transition: opacity 1.5s;
        }
        #orbit-hint.fade { opacity: 0; }
    </style>
</head>
<body>

    <!-- WebGL canvas -->
    <div id="viewer-container">
        <canvas id="model-canvas"></canvas>
    </div>

    <!-- Top info bar -->
    <div id="top-bar">
        <a id="back-link" href="index.html#three-d">&#8592; Portfolio</a>
        <div id="model-info">
            <p id="modelTitle">Loading…</p>
            <p id="modelDescription"></p>
        </div>
    </div>

    <!-- Group controls panel (toggled by Parts button) -->
    <div id="group-controls">
        <h3>Parts</h3>
        <div id="group-toggles"></div>
    </div>

    <!-- Bottom controls bar -->
    <div id="controls-bar">
        <button class="ctrl-btn active" id="btn-edges" onclick="toggleEdges()">Edges: On</button>
        <button class="ctrl-btn" id="btn-wire" onclick="toggleWireframe()">Wireframe: Off</button>
        <button class="ctrl-btn" onclick="resetCamera()">Reset View</button>
        <button class="ctrl-btn" id="btn-focus" onclick="focusSelection()">Focus Part</button>
        <button class="ctrl-btn" id="btn-isolate" onclick="isolateSelection()">Isolate</button>
        <button class="ctrl-btn" id="btn-show-all" onclick="showAllParts()">Show All</button>
        <button class="ctrl-btn" id="btn-auto-rotate" onclick="toggleAutoRotate()">Auto Rotate: Off</button>
        <button class="ctrl-btn" id="btn-screenshot" onclick="captureScreenshot()">Screenshot</button>
        <button class="ctrl-btn" onclick="toggleGroupControls()">Parts</button>
    </div>

    <!-- Overlays -->
    <div id="loading">Loading 3D model&#8230;</div>
    <div id="error"></div>
    <p id="orbit-hint">Click select &nbsp;·&nbsp; Shift+Click multi-select &nbsp;·&nbsp; Drag rotate &nbsp;·&nbsp; Keys: R E W I F A P Esc</p>

    <!-- Three.js r128 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.min.js"></script>

    <!-- Portfolio viewer logic (with edge-line support) -->
    <script src="assets/js/viewer.js"></script>

    <!-- Fade orbit hint after 4 s -->
    <script>
        setTimeout(() => {
            const hint = document.getElementById('orbit-hint');
            if (hint) hint.classList.add('fade');
        }, 4000);
    </script>
</body>
</html>
